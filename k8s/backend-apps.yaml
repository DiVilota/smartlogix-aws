apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smartlogix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 558195356447.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8085
        envFrom:
        - configMapRef:
            name: smartlogix-config
        - secretRef:
            name: smartlogix-secrets
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smartlogix
spec:
  type: ClusterIP
  ports:
  - port: 8085
    targetPort: 8085
  selector:
    app: auth-service

