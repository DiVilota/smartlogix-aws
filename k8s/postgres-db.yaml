apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: smartlogix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: smartlogix_local
        - name: POSTGRES_USER
          value: db_user_local
        - name: POSTGRES_PASSWORD
          value: db_password_local
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: smartlogix
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres-db